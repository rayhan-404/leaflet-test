<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Tile Comparison</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body { margin:0; padding:0; font-family:system-ui; background:#111; color:#fff; }
h2 { text-align:center; padding:12px; margin:0; font-size:14px; }
.maps { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:8px; }
.map-box { position:relative; }
.map-box .label { position:absolute; top:8px; left:8px; z-index:999; background:rgba(0,0,0,.7); color:#fff; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; backdrop-filter:blur(4px); }
#m1,#m2,#m3,#m4 { width:100%; height:280px; border-radius:12px; }
</style>
</head>
<body>
<h2>🏠 Khulna City — Map Tile Comparison</h2>
<div class="maps">
  <div class="map-box">
    <div class="label">1. CartoDB Voyager</div>
    <div id="m1"></div>
  </div>
  <div class="map-box">
    <div class="label">2. CartoDB Positron</div>
    <div id="m2"></div>
  </div>
  <div class="map-box">
    <div class="label">3. OpenStreetMap</div>
    <div id="m3"></div>
  </div>
  <div class="map-box">
    <div class="label">4. Stadia Alidade</div>
    <div id="m4"></div>
  </div>
</div>
<script>
const khulna = [22.8456, 89.5403];
const zoom = 14;
new L.Map('m1').setView(khulna, zoom).addLayer(new L.TileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'));
new L.Map('m2').setView(khulna, zoom).addLayer(new L.TileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'));
new L.Map('m3').setView(khulna, zoom).addLayer(new L.TileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png'));
new L.Map('m4').setView(khulna, zoom).addLayer(new L.TileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png'));
</script>
</body>
</html>
